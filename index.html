<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Q2C Viewer — NTT DATA México — 22-5-2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --navy:   #0B1426; --blue: #0067B1; --teal: #00C4D4;
  --green:  #0D7C5F; --purple: #6236B0; --red: #C0392B;
  --amber:  #D4881A; --bg: #F0F3F8; --card: #FFFFFF;
  --border: #D6DDE8; --text: #1A2440; --muted: #6B7A99;
  --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{background:var(--navy);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;border-bottom:3px solid var(--purple);position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px}
.logo-box{width:30px;height:30px;background:var(--blue);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:11px}
.logo-txt{color:#fff;font-size:13px;font-weight:600}.logo-txt span{color:var(--teal)}
.hdr-title{color:rgba(255,255,255,.6);font-size:12px;font-family:var(--mono)}
.hdr-stats{display:flex;gap:16px;align-items:center;font-size:11px;color:rgba(255,255,255,.5);font-family:var(--mono)}
.hdr-stat strong{color:rgba(255,255,255,.9)}
.hdr-stat-prebooking{font-size:11px;color:rgba(255,255,255,.85);font-family:var(--mono);background:rgba(192,57,43,.25);border:1px solid rgba(192,57,43,.55);border-radius:5px;padding:2px 10px;display:flex;align-items:center;gap:5px}
.hdr-stat-prebooking strong{color:#FF7F72;font-weight:700}

/* UPLOAD */
#upload-section{padding:20px 24px;border-bottom:1px solid var(--border);background:var(--card)}
.upload-intro{margin-bottom:14px}
.upload-intro h2{font-size:16px;font-weight:700;color:var(--navy)}
.upload-intro p{font-size:12px;color:var(--muted);margin-top:3px}
.upload-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.upload-card{background:var(--bg);border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;position:relative;user-select:none}
.upload-card:hover{border-color:var(--blue);background:#F7FAFF}
.upload-card.loaded{border-style:solid;border-color:var(--green);background:#F0FAF5}
.upload-card.required{border-color:var(--purple)}
.uc-icon{font-size:22px;margin-bottom:6px}
.uc-title{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:2px}
.uc-hint{font-size:10px;color:var(--muted);margin-bottom:8px}
.uc-req{font-size:9px;background:#F3EEFF;color:var(--purple);border-radius:3px;padding:1px 6px;display:inline-block;margin-bottom:6px}
.uc-status{font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:4px;display:inline-block}
.uc-status.empty{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.uc-status.ok{background:#E0F7ED;color:var(--green);font-weight:600}

/* FILTERS BAR */
#filters-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:none;align-items:flex-end;gap:12px;flex-wrap:wrap}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:160px}
.filter-group label{font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)}
.filter-select,.filter-input{height:34px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-size:12px;font-family:var(--font);color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
.filter-select:focus,.filter-input:focus{border-color:var(--blue);background:#fff}
.filter-input{width:220px}
.filter-actions{display:flex;gap:8px;align-items:flex-end;margin-left:auto}
.btn{height:34px;padding:0 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font)}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#0055A0}
.btn-ghost{background:var(--bg);color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--border)}
.results-count{font-size:11px;color:var(--muted);font-family:var(--mono);display:flex;align-items:center;padding:0 8px;white-space:nowrap}

/* MAIN */
#main{padding:20px 24px;min-height:400px}
#empty-msg{text-align:center;padding:60px 0;color:var(--muted)}
#empty-msg .em-icon{font-size:40px;margin-bottom:12px}
#empty-msg h3{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:6px}
#empty-msg p{font-size:13px;line-height:1.6}

/* PIPELINE HEADER */
.pipeline-legend{display:flex;gap:6px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:50%}

/* PROJECT CARDS */
#projects-grid{display:flex;flex-direction:column;gap:8px}
.proj-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:box-shadow .2s}
.proj-card:hover{box-shadow:0 3px 14px rgba(0,0,0,.08)}
.proj-card.alert-critical{border-left:4px solid var(--red)}
.proj-card.alert-warning{border-left:4px solid var(--amber)}
.proj-card.alert-ok{border-left:4px solid var(--green)}

.proj-header{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;user-select:none}
.proj-name{flex:1;min-width:0}
.proj-title{font-size:13px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-meta{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* MINI PIPELINE */
.mini-pipeline{display:flex;align-items:center;gap:3px;flex-shrink:0}
.stage-node{display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
.stage-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid transparent;position:relative}
.stage-circle.confirmed{background:var(--green);border-color:var(--green);color:#fff}
.stage-circle.pending{background:var(--bg);border-color:var(--border);color:var(--muted)}
.stage-circle.warning{background:#F59E0B;border-color:#F59E0B;color:#fff;box-shadow:0 0 0 3px rgba(245,158,11,.25)}
.stage-circle.unknown{background:var(--bg);border-color:var(--border);color:var(--border)}
.stage-circle.rejected{background:var(--red);border-color:var(--red);color:#fff}
.stage-lbl{font-size:8px;color:var(--muted);text-align:center;max-width:40px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stage-connector{width:20px;height:2px;background:var(--border);margin-bottom:10px;flex-shrink:0}
.stage-connector.done{background:var(--green)}
.stage-connector.warning{background:linear-gradient(90deg,var(--green),#F59E0B)}
.stage-connector.broken{background:var(--red);opacity:.7}
.stage-connector.prebooking{background:var(--red)}

.proj-badges{display:flex;gap:5px;align-items:center;flex-shrink:0}
.badge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap}
.badge-tech{background:#EEF4FB;color:var(--blue)}
.badge-ms{background:#F3EEFF;color:var(--purple)}
.badge-tscs{background:#E8F8EF;color:var(--green)}
.badge-ts{background:#E8F8EF;color:var(--green)}
.badge-cs{background:#FFF7ED;color:#C2410C}
.badge-ss{background:#F0FDF4;color:#166534}
.badge-vbr{background:#FDF4FF;color:#86198F}
.badge-hw{background:#F0F9FF;color:#0369A1}
.badge-family{background:#F8FAFC;color:#475569;border:1px solid var(--border)}
.badge-rej{background:#FDE8E8;color:var(--red)}
.badge-days{background:var(--bg);color:var(--muted);border:1px solid var(--border);font-family:var(--mono)}
.badge-days.warn{background:#FFF3E0;color:var(--amber);border-color:var(--amber)}
.badge-days.crit{background:#FDE8E8;color:var(--red);border-color:var(--red)}

.proj-expand{color:var(--muted);font-size:14px;width:20px;text-align:center;flex-shrink:0;transition:transform .2s}
.proj-card.expanded .proj-expand{transform:rotate(180deg)}

/* COPY BUTTON */
.copy-btn{background:none;border:none;cursor:pointer;padding:1px 4px;border-radius:3px;font-size:10px;color:var(--muted);transition:all .15s;vertical-align:middle;line-height:1}
.copy-btn:hover{background:var(--bg);color:var(--blue)}
.copy-btn.copied{color:var(--green)}

/* RESPONSABLE BADGE en header */
.proj-owner{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--navy);background:#EEF4FB;border:1px solid #C8DFF5;border-radius:4px;padding:2px 7px;white-space:nowrap;flex-shrink:0}

/* DETAIL PANEL */
.proj-detail{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.proj-card.expanded .proj-detail{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;padding-top:14px}
.ds-comparativo{border:1px solid var(--purple);background:#F8F4FF}
.cmp-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.cmp-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.cmp-val{font-size:11px;font-family:var(--mono);font-weight:600}
.cmp-pct{font-size:13px;font-weight:700;text-align:center}
.cmp-pct.positive{color:var(--green)}
.cmp-pct.negative{color:var(--red)}
.cmp-pct.neutral{color:var(--muted)}

.detail-stage{background:var(--bg);border-radius:8px;padding:12px;position:relative}
.detail-stage.ds-confirmed{border:1px solid var(--green);background:#F0FAF5}
.detail-stage.ds-warning{border:1px solid #F59E0B;background:#FFFBEB}
.detail-stage.ds-broken{border:1px solid var(--red);background:#FEF0F0}
.detail-stage.ds-pending{border:1px dashed var(--border)}
.detail-stage.ds-rejected{border:1px solid var(--red);background:#FEF0F0}
.ds-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ds-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
.ds-icon{font-size:14px}
.ds-field{margin-bottom:6px}
.ds-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
.ds-value{font-size:11px;color:var(--text);font-family:var(--mono);word-break:break-all}
.ds-value.highlight{color:var(--blue);font-weight:600}
.ds-value.missing{color:var(--border);font-style:italic;font-family:var(--font)}
.ds-value.ok{color:var(--green)}
.ds-value.warn{color:var(--red)}

/* FOOTER */
footer{background:var(--navy);color:rgba(255,255,255,.3);font-size:10px;text-align:center;padding:12px;font-family:var(--mono)}

/* Chips */
.chip{display:inline-block;font-size:9px;font-weight:600;border-radius:3px;padding:1px 6px}
.chip-g{background:#E8F8EF;color:var(--green)}
.chip-a{background:#FFF3E0;color:var(--amber)}
.chip-r{background:#FDE8E8;color:var(--red)}
.chip-b{background:#EEF4FB;color:var(--blue)}

/* Badges especiales header / cards */
.hdr-stat-sin-ics{font-size:11px;color:rgba(255,255,255,.85);font-family:var(--mono);background:rgba(232,160,32,.18);border:1px solid rgba(232,160,32,.45);border-radius:5px;padding:2px 10px;display:flex;align-items:center;gap:5px}
.hdr-stat-sin-ics strong{color:#FFD166;font-weight:700}
.badge-prebooking{font-size:10px;font-weight:700;color:var(--red);background:#FDE8E8;border:1px solid rgba(192,57,43,.35);border-radius:4px;padding:2px 8px;letter-spacing:.4px;white-space:nowrap}

/* Comparativo por familia */
.cmp-family-label{font-size:9px;font-weight:700;color:var(--purple);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.cmp-family-row{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.cmp-family-row:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.cmp-total-block{margin-top:8px;padding-top:8px;border-top:2px solid var(--purple)}
.cmp-total-label{font-size:9px;font-weight:700;color:var(--navy);margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px}
.cmp-pct-sm{text-align:right;font-size:10px;font-weight:700}

/* ── TABS ── */
.tab-nav{display:flex;background:var(--card);border-bottom:2px solid var(--border);padding:0 24px}
.tab-btn{padding:10px 22px;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .2s,border-color .2s}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal)}
.tab-btn:hover:not(.active){color:var(--navy)}
.tab-pane{display:none}.tab-pane.active{display:block}
/* ── KPI ── */
#kpi-dash{padding:20px 24px;background:var(--bg);min-height:400px}
.kpi-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:24px 0 12px}.kpi-section-title:first-child{margin-top:0}
.kpi-summary-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi-card{background:var(--card);border-radius:10px;padding:16px 18px;border:1px solid var(--border);display:flex;flex-direction:column;gap:4px}
.kpi-card .kc-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.kpi-card .kc-val{font-size:28px;font-weight:800;color:var(--navy);line-height:1}
.kpi-card .kc-sub{font-size:10px;color:var(--muted)}
.kpi-card.accent-teal{border-top:3px solid var(--teal)}.kpi-card.accent-green{border-top:3px solid var(--green)}
.kpi-card.accent-amber{border-top:3px solid var(--amber)}.kpi-card.accent-red{border-top:3px solid var(--red)}
.kpi-card.accent-purple{border-top:3px solid var(--purple)}
.kpi-charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.kpi-charts-row.three{grid-template-columns:1fr 1fr 1fr}
.kpi-chart-box{background:var(--card);border-radius:10px;padding:16px;border:1px solid var(--border)}
.kpi-chart-box h3{font-size:12px;font-weight:700;color:var(--navy);margin:0 0 4px}
.kpi-chart-box .kpi-sub{font-size:10px;color:var(--muted);margin:0 0 12px}
.kpi-chart-box canvas{max-height:220px}
.kpi-filter-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.kpi-filter-row label{font-size:11px;font-weight:600;color:var(--muted)}
.kpi-filter-row select{font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--navy);cursor:pointer}
.kpi-filter-row button{font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--navy);cursor:pointer;font-weight:600}
.q2c-cycle{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;background:#EEF6FB;border:1px solid rgba(11,123,140,.3);border-radius:6px;padding:3px 10px;white-space:nowrap;flex-shrink:0;cursor:default}
.q2c-cycle .cyc-label{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.q2c-cycle .cyc-days{font-size:14px;font-weight:800;color:var(--teal)}
.stage-dates{display:flex;gap:8px;align-items:center;margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);flex-wrap:wrap}
.stage-date-item{display:flex;flex-direction:column;gap:2px;min-width:75px}
.stage-date-item .sd-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.stage-date-item .sd-val{font-size:11px;font-weight:600;color:var(--navy)}
.stage-date-sep{color:var(--border);font-size:14px;align-self:center;margin:0 2px}
.stage-date-counter{font-size:13px;font-weight:800;color:var(--teal);background:rgba(11,123,140,.08);border-radius:5px;padding:3px 10px;border:1px solid rgba(11,123,140,.2);white-space:nowrap;align-self:center}
</style></head><body>
<header><div class="logo"><div class="logo-box">NTT</div><div class="logo-txt">NTT DATA <span>México</span></div></div>
<div class="hdr-title">Trazabilidad Q2C — Vista de Consulta &nbsp;<small style="font-size:10px;background:var(--teal);color:var(--navy);padding:2px 8px;border-radius:3px">VIEWER</small> &nbsp;<small style="font-size:10px;color:rgba(255,255,255,.4)">22/5/2026, 8:43:45 p.m.</small></div>
<div class="hdr-stats"><span>Proyectos: <strong id="stat-total">—</strong></span><span>Activos: <strong id="stat-active">—</strong></span><span>Completos: <strong id="stat-done">—</strong></span><span>Con alerta: <strong id="stat-alert">—</strong></span><span class="hdr-stat-prebooking">🔴 PreBooking: <strong id="stat-prebooking">—</strong></span></div></header>
<div class="tab-nav"><button class="tab-btn active" onclick="switchTab('trazabilidad',this)">🔗 Trazabilidad</button><button class="tab-btn" onclick="switchTab('indicadores',this)">📊 Indicadores</button></div>
<div id="tab-trazabilidad" class="tab-pane active">
<div id="filters-bar" style="display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;align-items:flex-end;gap:12px;flex-wrap:wrap">
<div class="filter-group"><label>🔍 Buscar</label><input type="text" class="filter-input" id="f-search" placeholder="Nombre, ID, folio, CN, NTTPO, SO, PO, contrato…"></div>
<div class="filter-group"><label>👤 AM</label><select class="filter-select" id="f-am"><option value="">Todos</option></select></div>
<div class="filter-group"><label>👤 Cliente</label><select class="filter-select" id="f-cliente"><option value="">Todos</option></select></div>
<div class="filter-group"><label>📁 Proyecto</label><select class="filter-select" id="f-opp"><option value="">Todos</option></select></div>
<div class="filter-group"><label>⚙️ Tipo</label><select class="filter-select" id="f-tipo"><option value="">Todos</option><option value="TECH">Tech</option><option value="MS">MS</option><option value="TS">TS</option><option value="CS">CS</option><option value="SS">SS</option><option value="VBR">VBR</option><option value="HW">HW</option></select></div>
<div class="filter-group"><label>🎯 Forecast</label><select class="filter-select" id="f-forecast" style="min-width:160px"><option value="">Todos</option></select></div>
<div class="filter-group"><label>📍 Estatus</label><select class="filter-select" id="f-stage"><option value="">Todas</option><option value="New">New</option><option value="PreBooking">PreBooking</option><option value="In Progress">In Progress</option><option value="Completed">Completed</option><option value="Rejected">Rejected</option><option value="Canceled">Canceled</option></select></div>
<div class="filter-group"><label>🚦 Etapa</label><select class="filter-select" id="f-etapa"><option value="">Todas</option><option value="sf">Solo SF</option><option value="ck">Checklist</option><option value="sap">SAP</option><option value="proc">Procurement</option><option value="log">Logística</option></select></div>
<div class="filter-group"><label>📏 WBS</label><select class="filter-select" id="f-wbs" style="min-width:170px"><option value="">Todos</option></select></div>
<div class="results-count" id="results-count">— proyectos</div><button class="btn btn-ghost" onclick="clearFilters()">Limpiar</button><button class="btn btn-primary" onclick="exportToExcel()" style="background:var(--green);border:none">⬇ Exportar</button></div>
<div id="main"><div id="tracker"><div class="pipeline-legend"><span style="font-size:11px;font-weight:600;color:var(--navy);margin-right:4px">Leyenda:</span><div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Completado</div><div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div>En proceso</div><div class="legend-item"><div class="legend-dot" style="background:var(--border)"></div>Sin dato</div><div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Cadena rota</div></div><div id="projects-grid"></div></div></div></div>
<div id="tab-indicadores" class="tab-pane"><div id="kpi-dash"></div></div>

:"","webOrder":"","contrato":"","displayName":"Biva_TS_FY26_Mayo_Ciberseguridad Palo Alto","hasCK":false,"logDone":false,"procDone":false,"ckDone":false,"sapDone":false,"sfDone":false,"sfDateStart":"2026-05-08T06:00:00.000Z","sfDateEnd":"2026-11-30T06:00:00.000Z","sfDays":206,"ckDateStart":null,"ckDateEnd":null,"ckDays":null,"procDateStart":null,"procDateEnd":null,"procDaysCalc":null,"logDateStart":null,"logDateRecep":null,"logDateEntrega":null,"logDaysRecep":null,"logDaysEntrega":null,"q2cDays":206,"sfRec":{"Account Name":"Bolsa Institucional de Valores S.A. de C.V.","Vendor":"Other","Stage":"Requirements Definition","Forecast Category":"Pipeline"},"procRec":null,"logRec":null,"rptRec":null}]; const ALL_FORECASTS=["Best Case","Closed","Commit","Omitted","Pipeline"]; let FILTERED=[]; let kpiCharts={};

const STAGE_ORDER=["sf","ck","sap","proc","log"];
const STAGE_NAMES={sf:"Salesforce",ck:"Checklist",proc:"Procurement",log:"Logística",sap:"SAP"};
const STAGE_ICONS={sf:"📊",ck:"🔗",proc:"📋",log:"🚚",sap:"⚙️"};
function debounce(fn, delay) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function norm(v) {
  if (v == null) return '';
  return String(v).trim().toLowerCase();
}

function hasVal(v) {
  if (v == null) return false;
  const s = String(v).trim();
  return s !== '' && s !== 'null' && s !== 'undefined';
}

function toDate(val) {
  if (!val) return null;
  if (val instanceof Date) return isNaN(val.getTime()) ? null : val;
  try { const d = new Date(val); return isNaN(d.getTime()) ? null : d; } catch(e) { return null; }
}

function daysSince(d) {
  if (!d) return null;
  const dt = toDate(d);
  if (!dt) return null;
  return Math.round((new Date() - dt) / 86400000);
}

function fmtDate(d) {
  if (!d) return null;
  const dt = (d instanceof Date) ? d : toDate(d);
  if (!dt || isNaN(dt)) return null;
  return dt.toLocaleDateString('es-MX', { day: '2-digit', month: 'short', year: '2-digit' });
}

function stageDatesHtml(start, end, days, extraItems) {
  if (!start && !end) return '';
  const parts = [];
  if (start) parts.push('<div class="stage-date-item"><div class="sd-label">Inicio</div><div class="sd-val">' + (fmtDate(start)||'') + '</div></div>');
  if (extraItems) parts.push(...extraItems);
  else if (end) parts.push('<div class="stage-date-item"><div class="sd-label">Fin</div><div class="sd-val">' + (fmtDate(end)||'') + '</div></div>');
  if (days !== null && days !== undefined) parts.push('<div class="stage-date-counter">' + days + 'd</div>');
  return '<div class="stage-dates">' + parts.join('<div class="stage-date-sep">→</div>') + '</div>';
}

function stageClass(p, stageId) {
  const stLow = p.status.toLowerCase();
  if (stLow === 'prebooking') return 'rejected';
  if (stLow === 'rejected' && stageId === 'ck') return 'rejected';
  if (stLow === 'canceled' && stageId === 'ck') return 'pending';
  // SF-only (sin ICS): SF en amarillo, resto pendiente
  if (!p.hasCK && stageId === 'sf') return 'warning';
  if (!p.hasCK && stageId !== 'sf') return 'pending';
  const s = p.stages[stageId];
  if (!s) return 'unknown';
  if (s.confirmed)  return 'confirmed';  // proceso terminado → verde
  if (s.inProgress) return 'warning';    // en proceso / pendiente → amarillo
  // Cadena rota: esta etapa no tiene datos pero una posterior sí → rojo
  const idx = STAGE_ORDER.indexOf(stageId);
  const laterHasData = STAGE_ORDER.slice(idx + 1).some(sid => {
    const ls = p.stages[sid];
    return ls && (ls.confirmed || ls.inProgress);
  });
  if (laterHasData) return 'rejected';   // hueco en la cadena → rojo
  return 'pending';                      // aún no alcanzado → gris
}

function connectorClass(p, fromId) {
  if (p.status.toLowerCase() === 'prebooking') return 'prebooking';
  const order = STAGE_ORDER;
  const fromIdx = order.indexOf(fromId);
  const toId = order[fromIdx + 1];
  if (!toId) return '';
  const fCls = stageClass(p, fromId);
  const tCls = stageClass(p, toId);
  if (fCls === 'confirmed' && tCls === 'confirmed') return 'done';
  if (fCls === 'confirmed' && tCls === 'warning')   return 'warning';
  if (tCls === 'rejected' || fCls === 'rejected')   return 'broken';
  return '';
}

function stageIcon(cls) {
  return cls === 'confirmed' ? '✓' : cls === 'warning' ? '●' : cls === 'rejected' ? '✗' : '○';
}

function renderCard(p) {
  // Mini pipeline
  const pipeHtml = STAGE_ORDER.map((sid, i) => {
    const cls = stageClass(p, sid);
    const connCls = i < STAGE_ORDER.length - 1 ? connectorClass(p, sid) : '';
    return `
      <div class="stage-node">
        <div class="stage-circle ${cls}" title="${STAGE_NAMES[sid]}">${stageIcon(cls)}</div>
        <div class="stage-lbl">${STAGE_NAMES[sid]}</div>
      </div>
      ${i < STAGE_ORDER.length - 1 ? `<div class="stage-connector ${connCls}"></div>` : ''}`;
  }).join('');

  // Badges — deduplicar tipos y prodFam (case-insensitive)
  const seenTipos = new Set();
  const allTipos = [...p.tipos, p.prodFam].filter(v => {
    if (!v) return false;
    const key = v.toUpperCase();
    if (seenTipos.has(key)) return false;
    seenTipos.add(key);
    return true;
  });
  const typeBadges = allTipos.map(t =>
    `<span class="badge badge-${t.toLowerCase().replace(/\s+/g,'')}">${t}</span>`).join('');

  const ageBadge = p.isActive && p.age !== null
    ? `<span class="badge badge-days ${p.alertLevel === 'critical' ? 'crit' : p.alertLevel === 'warning' ? 'warn' : ''}">${p.age}d</span>`
    : '';

  // Status chip
  const stLow = p.status.toLowerCase();
  const stColor = stLow === 'completed' ? 'chip-g' :
                  stLow.includes('cancel') || stLow === 'rejected' ? 'chip-r' :
                  stLow === 'prebooking' || stLow === 'in progress' ? 'chip-b' : 'chip-a';

  // Nombre principal: viene del displayName del proyecto
  const displayName = p.displayName;

  // Responsable: AM preferido, si no ICS
  const responsable = p.am || p.ics || null;

  // Meta inferior: SF ID con copy, luego cliente (solo si no es el displayName), vendor
  const sfCopy = p.oppId
    ? `ID SF: <span class="mono-id">${escHtml(p.oppId)}</span><button class="copy-btn" data-val="${escHtml(p.oppId)}" title="Copiar ID SF">⎘</button>`
    : '';
  const clienteInMeta = (displayName === p.cliente) ? null : escHtml(p.cliente);
  const vendorTxt     = p.vendor ? escHtml(p.vendor) : null;
  const metaPartsHtml = [sfCopy, clienteInMeta, vendorTxt].filter(Boolean).join('  ·  ');

  // Detail panel
  const detailHtml = STAGE_ORDER.map(sid => renderDetailStage(p, sid)).join('') + renderComparativo(p);

  return `
    <div class="proj-card alert-${p.alertLevel}" id="pc-${p.idx}">
      <div class="proj-header">
        <div class="proj-name">
          <div class="proj-title">${escHtml(displayName)}</div>
          <div class="proj-meta">${metaPartsHtml}</div>
          ${responsable ? `<div><span class="proj-owner">👤 ${escHtml(responsable)}</span></div>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          ${stLow === 'prebooking' ? `<span class="badge-prebooking">⚠ PREBOOKING</span>` : ''}
          ${p.q2cDays !== null ? `<div class="q2c-cycle" title="Ciclo total Q2C"><span class="cyc-label">Q2C</span><span class="cyc-days">${p.q2cDays}d</span></div>` : ''}
          <div class="mini-pipeline">${pipeHtml}</div>
        </div>
        <div class="proj-badges">
          ${typeBadges}${ageBadge}
        </div>
        <div class="proj-expand">▼</div>
      </div>
      <div class="proj-detail">${detailHtml}</div>
    </div>`;
}

function renderDetailStage(p, sid) {
  const cls = stageClass(p, sid);
  const clsMap = { confirmed:'ds-confirmed', warning:'ds-warning', rejected:'ds-broken', pending:'ds-pending', unknown:'ds-pending' };
  const dsCls  = clsMap[cls] || 'ds-pending';

  let fields = '';

  if (sid === 'sf') {
    fields += dsFieldCopy('Opp ID',    p.oppId,          p.stages.sf.confirmed);
    fields += dsField('Cliente',   p.sfRec?.['Account Name'] || p.cliente);
    fields += dsField('Proveedor', p.sfRec?.['Vendor']);
    fields += dsField('Stage SF',  p.sfRec?.['Stage']);
    fields += dsField('Forecast Category', p.forecastCategory);
    fields += stageDatesHtml(p.sfDateStart, p.sfDateEnd, p.sfDays);
  }
  else if (sid === 'ck') {
    fields += dsField('Status SOA', p.statusSOA);
    fields += dsField('ICS',        p.ics);
    fields += dsFieldCopy('Customer PO', p.po);
    fields += dsFieldCopy('CN',         p.cn);
    fields += dsFieldCopy('Web Order',  p.webOrder);
    fields += dsField('Creado',     p.created ? p.created.toLocaleDateString('es-MX') : null);
    fields += dsField('Días abierto', p.age !== null ? p.age + ' días' : null, null,
                      p.age > 30 ? 'warn' : p.age > 15 ? '' : '');
    if (p.rejected > 0) fields += dsField('Rechazos', p.rejected + ' rechazo(s)', false, 'warn');
    fields += stageDatesHtml(p.ckDateStart, p.ckDateEnd, p.ckDays);
  }
  else if (sid === 'proc') {
    fields += dsFieldCopy('Compras Folio', p.folio,                 hasVal(p.folio));
    fields += dsFieldCopy('NTT PO',        p.nttpo,                 hasVal(p.nttpo));
    fields += dsField('Estatus OC',    p.procRec?.['Estatus']);
    fields += dsField('Proveedor OC',  p.procRec?.['Proveedores']);
    fields += stageDatesHtml(p.procDateStart, p.procDateEnd, p.procDaysCalc);
  }
  else if (sid === 'log') {
    fields += dsField('Sales Order',   p.so,   hasVal(p.so));
    fields += dsFieldCopy('Customer PO', p.po, hasVal(p.po));
    fields += dsField('NTTPO',         p.nttpo, hasVal(p.nttpo));
    fields += dsField('Qty Pendiente', p.logRec?.['Qty OutStand'] != null ? p.logRec['Qty OutStand'] : null);
    if (p.logDateStart || p.logDateRecep || p.logDateEntrega) {
      const extras = [];
      if (p.logDateRecep)   extras.push(`<div class="stage-date-item"><div class="sd-label">Recepción material</div><div class="sd-val">${fmtDate(p.logDateRecep)}</div></div>`);
      if (p.logDateEntrega) extras.push(`<div class="stage-date-item"><div class="sd-label">Entrega cliente</div><div class="sd-val">${fmtDate(p.logDateEntrega)}</div></div>`);
      fields += stageDatesHtml(p.logDateStart, null, p.logDaysEntrega ?? p.logDaysRecep, extras);
    }
  }
  else if (sid === 'sap') {
    fields += dsFieldCopy('Sales Order',  p.so,     hasVal(p.so));
    fields += dsFieldCopy('Contrato',     p.contrato);
    fields += dsField('WBS',          p.logRec?.['WBS Element']);
    fields += dsField('Completado',   p.completed ? p.completed.toLocaleDateString('es-MX') : null);
    fields += dsField('Estado',       p.status === 'Completed' ? 'Procesado en SAP' : 'Pendiente',
                      p.status === 'Completed', p.status !== 'Completed' ? 'warn' : '');
  }

  return `
    <div class="detail-stage ${dsCls}">
      <div class="ds-header">
        <div class="ds-title">${STAGE_NAMES[sid]}</div>
        <div class="ds-icon">${STAGE_ICONS[sid]}</div>
      </div>
      ${fields}
    </div>`;
}

function renderComparativo(p) {
  const fmt = v => '$' + Number(v).toLocaleString('es-MX', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  if (!p.rptRec) {
    return `
      <div class="detail-stage ds-comparativo">
        <div class="ds-header">
          <div class="ds-title">Comparativo</div>
          <div class="ds-icon">📊</div>
        </div>
        <div class="ds-value missing" style="font-size:10px;margin-top:8px">Sin datos del reporte.<br>Carga Reporte Opp vs Booking.</div>
      </div>`;
  }

  const families = Object.entries(p.rptRec); // [[family, {marginSAP, acvGP}], ...]

  // Totales globales de la oportunidad
  const totSAP = families.reduce((s,[,d]) => s + d.marginSAP, 0);
  const totGP  = families.reduce((s,[,d]) => s + d.acvGP,    0);
  const totDelta = totSAP - totGP;
  const totPct   = totGP !== 0 ? (totDelta / Math.abs(totGP)) * 100 : null;
  const totCls   = totDelta > 0 ? 'positive' : totDelta < 0 ? 'negative' : 'neutral';
  const totArrow = totDelta > 0 ? '▲' : totDelta < 0 ? '▼' : '—';

  const familyRows = families.map(([family, d]) => {
    const delta = d.marginSAP - d.acvGP;
    const pct   = d.acvGP !== 0 ? (delta / Math.abs(d.acvGP)) * 100 : null;
    const cls   = delta > 0 ? 'positive' : delta < 0 ? 'negative' : 'neutral';
    const arrow = delta > 0 ? '▲' : delta < 0 ? '▼' : '—';
    return `
      <div class="cmp-family-row">
        <div class="cmp-family-label">${escHtml(family)}</div>
        <div class="cmp-row"><span class="cmp-label">Margin SAP</span><span class="cmp-val" style="color:var(--blue)">${fmt(d.marginSAP)}</span></div>
        <div class="cmp-row"><span class="cmp-label">ACV GP</span><span class="cmp-val" style="color:var(--purple)">${fmt(d.acvGP)}</span></div>
        <div class="cmp-pct-sm ${cls}">
          ${arrow} ${pct != null ? Math.abs(pct).toFixed(1)+'%' : '—'} <span style="font-size:9px;font-weight:400">(${fmt(delta)})</span>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="detail-stage ds-comparativo" style="overflow-y:auto;max-height:220px">
      <div class="ds-header">
        <div class="ds-title">Comparativo por Familia</div>
        <div class="ds-icon">📊</div>
      </div>
      ${familyRows}
      ${families.length > 1 ? `
      <div class="cmp-total-block">
        <div class="cmp-total-label">Total Opp</div>
        <div class="cmp-row"><span class="cmp-label">Margin SAP</span><span class="cmp-val" style="color:var(--blue)">${fmt(totSAP)}</span></div>
        <div class="cmp-row"><span class="cmp-label">ACV GP</span><span class="cmp-val" style="color:var(--purple)">${fmt(totGP)}</span></div>
        <div class="cmp-pct ${totCls}">${totArrow} ${totPct != null ? Math.abs(totPct).toFixed(1)+'%' : '—'}</div>
      </div>` : ''}
    </div>`;
}

function dsField(label, value, confirmed=null, modifier='') {
  const v = value != null && String(value).trim() !== '' ? String(value).trim() : null;
  let valClass = 'ds-value';
  if (!v) valClass += ' missing';
  else if (confirmed === true) valClass += ' ok';
  else if (confirmed === false) valClass += ' highlight';
  if (modifier === 'warn') valClass += ' warn';

  return `
    <div class="ds-field">
      <div class="ds-label">${label}</div>
      <div class="${valClass}">${v ? escHtml(v) : 'Sin dato'}</div>
    </div>`;
}

function dsFieldCopy(label, value, confirmed=null, modifier='') {
  const v = value != null && String(value).trim() !== '' ? String(value).trim() : null;
  let valClass = 'ds-value';
  if (!v) valClass += ' missing';
  else if (confirmed === true) valClass += ' ok';
  else if (confirmed === false) valClass += ' highlight';
  if (modifier === 'warn') valClass += ' warn';

  const copyBtn = v
    ? `<button class="copy-btn" data-val="${escHtml(v)}" title="Copiar">⎘</button>`
    : '';

  return `
    <div class="ds-field">
      <div class="ds-label">${label}</div>
      <div class="${valClass}" style="display:flex;align-items:center;gap:3px">
        <span>${v ? escHtml(v) : 'Sin dato'}</span>${copyBtn}
      </div>
    </div>`;
}

function copyToClipboard(val, btnEl) {
  navigator.clipboard.writeText(val).then(() => {
    btnEl.textContent = '✓';
    btnEl.classList.add('copied');
    setTimeout(() => { btnEl.textContent = '⎘'; btnEl.classList.remove('copied'); }, 1500);
  });
}

function fillSelect(id, options, maxLen = 0) {
  const sel = document.getElementById(id);
  if (!sel) return;
  const cur = sel.value;
  sel.innerHTML = '<option value="">Todos</option>';
  options.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o;
    opt.textContent = maxLen && o.length > maxLen ? o.substring(0, maxLen) + '…' : o;
    if (o === cur) opt.selected = true;
    sel.appendChild(opt);
  });
}

function clearFilters() {
  ['f-search','f-cliente','f-tipo','f-stage','f-am','f-opp','f-forecast','f-wbs','f-etapa'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  applyFilters();
}

function applyFilters() {
  const search   = norm(document.getElementById('f-search').value);
  const cliente  = document.getElementById('f-cliente').value;
  const tipo     = document.getElementById('f-tipo').value;
  const stage    = document.getElementById('f-stage').value;
  const am       = document.getElementById('f-am').value;
  const opp      = document.getElementById('f-opp').value;
  const forecast = document.getElementById('f-forecast').value;
  const wbs      = document.getElementById('f-wbs').value;
  const etapa    = document.getElementById('f-etapa').value;

  FILTERED = PROJECTS.filter(p => {
    if (search && !norm(p.oppName).includes(search) &&
        !norm(p.cliente).includes(search) &&
        !norm(p.oppId).includes(search) &&
        !norm(p.am).includes(search) &&
        !norm(p.folio).includes(search) &&
        !norm(p.cn).includes(search) &&
        !norm(p.nttpo).includes(search) &&
        !norm(p.po).includes(search) &&
        !norm(p.so).includes(search) &&
        !norm(p.webOrder).includes(search) &&
        !norm(p.contrato).includes(search)) return false;
    if (cliente  && p.cliente !== cliente)           return false;
    if (tipo && !p.tipos.map(t=>t.toUpperCase()).includes(tipo.toUpperCase()) &&
               (p.prodFam||'').toUpperCase() !== tipo.toUpperCase()) return false;
    if (stage    && p.status !== stage)              return false;
    if (am       && p.am !== am)                     return false;
    if (opp      && p.displayName !== opp)           return false;
    if (forecast && p.forecastCategory !== forecast) return false;
    if (wbs      && (p.logRec?.['WBS Element'] || '') !== wbs) return false;
    if (etapa    && p.currentStage !== etapa) return false;
    return true;
  });

  renderProjects();
  updateStats();
}

function renderProjects() {
  const grid = document.getElementById('projects-grid');
  document.getElementById('results-count').textContent = FILTERED.length + ' proyectos';

  if (!FILTERED.length) {
    grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">Sin resultados con los filtros actuales</div>';
    return;
  }

  grid.innerHTML = FILTERED.map(p => renderCard(p)).join('');

  // Bind click handlers
  grid.querySelectorAll('.proj-header').forEach(hdr => {
    hdr.addEventListener('click', (e) => {
      if (e.target.closest('.copy-btn')) return; // no expandir al copiar
      const card = hdr.closest('.proj-card');
      card.classList.toggle('expanded');
    });
  });

  grid.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      copyToClipboard(btn.dataset.val, btn);
    });
  });
}

function updateStats() {
  const all   = PROJECTS.length;
  const active = PROJECTS.filter(p => p.isActive).length;
  const done   = PROJECTS.filter(p => p.status.toLowerCase() === 'completed').length;
  const alerts = PROJECTS.filter(p => p.alertLevel !== 'ok').length;
  const prebooking = PROJECTS.filter(p => p.status.toLowerCase() === 'prebooking').length;
  const sinICS = PROJECTS.filter(p => !p.hasCK).length;
  document.getElementById('stat-total').textContent  = all;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-done').textContent   = done;
  document.getElementById('stat-alert').textContent  = alerts;
  document.getElementById('stat-prebooking').textContent = prebooking;
  const elSinICS = document.getElementById('stat-sin-ics');
  if (elSinICS) elSinICS.textContent = sinICS;
}

function exportToExcel() {
  if (!FILTERED || FILTERED.length === 0) {
    alert('No hay proyectos para exportar con los filtros actuales.');
    return;
  }

  const stageLabel = sid => STAGE_NAMES[sid] || sid || '—';
  const yesNo = v => v ? 'Sí' : 'No';

  const exportData = FILTERED.map(p => {
    // Cobertura: cuántos sistemas tienen dato
    const cobertura = STAGE_ORDER.filter(sid => {
      const s = p.stages[sid];
      return s && s.confirmed;
    }).length;

    return {
      'Proyecto / Oportunidad': p.oppName || p.cliente || 'Sin nombre',
      'Cliente':                p.cliente || '',
      'Responsable (AM)':       p.am      || '',
      'ICS':                    p.ics     || '',
      'Tipo':                   p.tipos.join(', ') || '',
      'Opp ID':                 p.oppId   || '',
      'Folio Compras':          p.folio   || '',
      'NTT PO':                 p.nttpo   || '',
      'Sales Order SAP':        p.so      || '',
      'Etapa Actual':           stageLabel(p.currentStage),
      'Status SOA':             p.statusSOA || '',
      'Días Abierto':           p.age     ?? '',
      'Alerta':                 p.alertLevel === 'critical' ? '🔴 Crítico' :
                                p.alertLevel === 'warning'  ? '🟡 Riesgo'  : '🟢 OK',
      'Rechazos':               p.rejected || 0,
      'Cobertura Sistemas':     cobertura + '/' + STAGE_ORDER.length,
      'SF Confirmado':          yesNo(p.stages.sf?.confirmed),
      'Checklist Confirmado':   yesNo(p.stages.ck?.confirmed),
      'SAP Confirmado':         yesNo(p.stages.sap?.confirmed),
      'Procurement Confirmado': yesNo(p.stages.proc?.confirmed),
      'Logística Confirmado':   yesNo(p.stages.log?.confirmed),
      'Fecha Creación':         p.created   ? p.created.toLocaleDateString('es-MX')   : '',
      'Fecha Completado':       p.completed ? p.completed.toLocaleDateString('es-MX') : '',
    };
  });

  const ws = XLSX.utils.json_to_sheet(exportData);

  // Ancho de columnas automático
  const colWidths = Object.keys(exportData[0]).map(k => ({
    wch: Math.max(k.length, ...exportData.map(r => String(r[k] || '').length)) + 2
  }));
  ws['!cols'] = colWidths;

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Trazabilidad Operativa');

  // Nombre de archivo con fecha
  const hoy = new Date().toLocaleDateString('es-MX').replace(/\//g,'-');
  XLSX.writeFile(wb, `Reporte_Q2C_${hoy}.xlsx`);
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'indicadores' && PROJECTS.length) renderKPIs();
}

function destroyChart(id){ if(kpiCharts[id]){ kpiCharts[id].destroy(); delete kpiCharts[id]; } }

function fmtD(d){ return d != null ? d + 'd' : '—'; }

function renderKPIs(filterAM) {

    +'<div class="kpi-summary-row">'
    +'<div class="kpi-card accent-teal"><div class="kc-label">Total</div><div class="kc-val">'+filtered.length+'</div><div class="kc-sub">oportunidades</div></div>'
    +'<div class="kpi-card accent-green"><div class="kc-label">Ciclo Q2C promedio</div><div class="kc-val">'+(avgQ2Cv!=null?avgQ2Cv+'d':'—')+'</div><div class="kc-sub">'+closed.length+' cerradas</div></div>'
    +'<div class="kpi-card accent-red"><div class="kc-label">PreBooking</div><div class="kc-val">'+prebooking.length+'</div><div class="kc-sub">'+(filtered.length?((prebooking.length/filtered.length*100).toFixed(1))+'%':'0%')+' del total</div></div>'
    +'<div class="kpi-card accent-amber"><div class="kc-label">Con rechazos</div><div class="kc-val">'+rejected.length+'</div><div class="kc-sub">en Checklist ICS</div></div>'
    +'<div class="kpi-card accent-purple"><div class="kc-label">Etapa más lenta</div><div class="kc-val">'+bottleneckStage(stageAvg)+'</div><div class="kc-sub">'+bottleneckDays(stageAvg)+'d promedio</div></div>'
    +'</div>'
    +'<div class="kpi-section-title">Ciclo Q2C por AM · Días promedio por etapa · PreBooking</div>'
    +'<div class="kpi-charts-row three">'
    +'<div class="kpi-chart-box"><h3>⏱ Ciclo Q2C por AM</h3><p class="kpi-sub">Solo opps cerradas</p><canvas id="ch-am-cycle"></canvas></div>'
    +'<div class="kpi-chart-box"><h3>🐢 Días promedio por etapa</h3><p class="kpi-sub">Rojo = cuello de botella</p><canvas id="ch-stage-avg"></canvas></div>'
    +'<div class="kpi-chart-box"><h3>🔴 PreBooking por AM</h3><p class="kpi-sub">Opps atascadas</p><canvas id="ch-prebook"></canvas></div>'
    +'</div>'
    +'<div class="kpi-section-title">Top clientes · Rechazos · Distribución por etapa</div>'
    +'<div class="kpi-charts-row three">'
    +'<div class="kpi-chart-box"><h3>🏢 Top 10 Clientes</h3><p class="kpi-sub">Por número de oportunidades</p><canvas id="ch-top-clientes"></canvas></div>'
    +'<div class="kpi-chart-box"><h3>⚠ Rechazos por AM</h3><p class="kpi-sub">Total acumulado en Checklist</p><canvas id="ch-rechazos"></canvas></div>'
    +'<div class="kpi-chart-box"><h3>📍 Distribución por etapa</h3><p class="kpi-sub">Dónde está el pipeline</p><canvas id="ch-dist-etapa"></canvas></div>'
    +'</div>';

  if (typeof Chart === 'undefined') return;
  var C = {teal:'rgba(11,123,140,.85)',green:'rgba(29,184,142,.85)',amber:'rgba(232,160,32,.85)',red:'rgba(192,57,43,.85)',purple:'rgba(91,73,165,.85)',navy:'rgba(13,27,62,.85)'};

function avg(arr){ return arr.length ? Math.round(arr.reduce(function(a,b){return a+b;},0)/arr.length) : null; }

function topN(arr, keyFn, n){
  var map={};
  arr.forEach(function(p){ var k=keyFn(p)||'Sin dato'; map[k]=(map[k]||0)+1; });
  return Object.entries(map).sort(function(a,b){return b[1]-a[1];}).slice(0,n).map(function(e){return {key:e[0],count:e[1]};});
}

function groupByAM(arr, keyFn, valFn){
  var map={};
  arr.forEach(function(p){ var k=keyFn(p)||'Sin AM'; if(!map[k])map[k]=[]; map[k].push(valFn(p)); });
  return Object.entries(map).map(function(e){ return {key:e[0],avg:Math.round(e[1].reduce(function(a,b){return a+b;},0)/e[1].length)}; }).sort(function(a,b){return b.avg-a.avg;});
}

function groupByAMSum(arr, keyFn, valFn, n){
  var map={};
  arr.forEach(function(p){ var k=keyFn(p)||'Sin AM'; map[k]=(map[k]||0)+valFn(p); });
  return Object.entries(map).sort(function(a,b){return b[1]-a[1];}).slice(0,n||10).map(function(e){return {key:e[0],total:e[1]};});
}

function bottleneckStage(sa){ var names={sf:'SF',ck:'ICS',proc:'Proc',log:'Log'}; var e=Object.entries(sa).filter(function(x){return x[1]!=null;}).sort(function(a,b){return b[1]-a[1];}); return e.length?names[e[0][0]]:'—'; }

function bottleneckDays(sa){ var v=Object.values(sa).filter(function(x){return x!=null;}).sort(function(a,b){return b-a;}); return v.length?v[0]:'—'; }
function populateFilters(){var cls=[...new Set(PROJECTS.map(function(p){return p.cliente;}).filter(Boolean))].sort();var ics=new Set(PROJECTS.map(function(p){return p.ics;}).filter(Boolean));var ams=[...new Set(PROJECTS.map(function(p){return p.am;}).filter(function(v){return v&&!ics.has(v);}))].sort();var ops=[...new Set(PROJECTS.map(function(p){return p.displayName;}).filter(Boolean))].sort();var wbs=[...new Set(PROJECTS.map(function(p){return p.logRec&&p.logRec["WBS Element"]?p.logRec["WBS Element"]:"";}).filter(Boolean))].sort();fillSelect("f-cliente",cls);fillSelect("f-forecast",ALL_FORECASTS);fillSelect("f-wbs",wbs);fillSelect("f-am",ams);fillSelect("f-opp",ops,45);}
document.addEventListener("DOMContentLoaded",function(){var df=debounce(applyFilters,280);["f-search","f-cliente","f-tipo","f-stage","f-am","f-opp","f-forecast","f-wbs","f-etapa"].forEach(function(id){var el=document.getElementById(id);if(!el)return;el.addEventListener(id==="f-search"?"input":"change",id==="f-search"?df:applyFilters);});populateFilters();applyFilters();updateStats();renderKPIs();});
</script></body></html>
